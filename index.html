<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RenoCrypt — Design Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,300..500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e; --bone: #e8e4d8; --bone-55: #9a968c; --line: #2a2a2e;
    --acc: #62e6c8; --blue: #4d6fe8;
    --display: "Clash Display", system-ui, sans-serif;
    --serif: "Newsreader", Georgia, serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--bone); font-family: var(--display); -webkit-font-smoothing: antialiased; min-height: 100svh; display: flex; flex-direction: column; }
  .wrap { max-width: 62rem; margin: 0 auto; padding: 0 1.5rem; width: 100%; }
  header { padding: 2rem 0 1rem; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: baseline; }
  .brand { font-family: var(--mono); font-size: .78rem; letter-spacing: .18em; }
  .brand .dot { color: var(--acc); }
  header span:last-child { font-family: var(--mono); font-size: .62rem; letter-spacing: .14em; color: var(--bone-55); text-transform: uppercase; }
  main { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 3rem 0; }
  h1 { font-weight: 600; text-transform: uppercase; letter-spacing: -.03em; font-size: clamp(2rem, 6vw, 3.6rem); line-height: 1; }
  h1 em { font-family: var(--serif); font-style: italic; font-weight: 340; text-transform: none; color: var(--acc); }
  .sub { margin-top: .9rem; font-family: var(--serif); font-style: italic; color: var(--bone-55); font-size: 1.05rem; }
  ul { list-style: none; padding: 0; margin-top: 2.6rem; border-top: 1px solid var(--line); }
  li a {
    display: grid; grid-template-columns: 3.4rem 1fr auto; gap: 1.2rem; align-items: baseline;
    padding: 1.3rem .2rem; border-bottom: 1px solid var(--line);
    text-decoration: none; color: var(--bone); transition: background .25s, padding-left .3s;
  }
  li a:hover { background: rgba(255,255,255,.03); padding-left: .6rem; }
  .idx { font-family: var(--mono); font-size: .7rem; color: var(--bone-55); }
  .name { font-weight: 600; font-size: 1.35rem; letter-spacing: -.01em; }
  .name em { font-family: var(--serif); font-style: italic; font-weight: 340; }
  .meta { font-family: var(--mono); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--bone-55); text-align: right; }
  footer { padding: 1.4rem 0; border-top: 1px solid var(--line); font-family: var(--mono); font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--bone-55); display: flex; justify-content: space-between; }
  footer a { color: var(--bone); text-decoration: none; }
  footer a:hover { color: var(--acc); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="brand">RENOCRYPT<span class="dot">_</span> DESIGN LAB</span>
    <span>Direction studies</span>
  </header>
  <main>
    <h1>Pick a <em>direction.</em></h1>
    <p class="sub">Rendered studies, judged side by side — switch with the pill or arrow keys.</p>
    <ul>
      <li><a href="/r1-proof-sheet.html">
        <span class="idx">R1</span>
        <span class="name">Proof <em>Sheet</em></span>
        <span class="meta">journal register · KaTeX hero · light</span>
      </a></li>
      <li><a href="/r2-signal-cabinet.html">
        <span class="idx">R2</span>
        <span class="name">Signal <em>Cabinet</em></span>
        <span class="meta">live cipher rotor · console room · dark</span>
      </a></li>
    </ul>
  </main>
  <footer>
    <span>renocrypt/design</span>
    <a href="https://github.com/renocrypt/design">source ↗</a>
  </footer>
</div>
</body>
</html>
